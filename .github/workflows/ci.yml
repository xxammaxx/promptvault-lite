name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript/React)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  rust:
    name: Rust (Tauri Backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

      - name: Build check
        working-directory: src-tauri
        run: cargo build

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "::group::Scanning for common secret patterns"
          # High-confidence patterns (check all tracked files)
          # High-specificity patterns only — broad terms like "secret", "password",
          # "api_key" match legitimate code/docs and produce false positives.
          # The project's own Rust `detect_secrets()` covers content-level scanning.
          PATTERNS=(
            "-----BEGIN.*PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "gh[opsur]_[0-9a-zA-Z]{36}"
            "github_pat_[0-9a-zA-Z]{22,}"
            "sk_live_[0-9a-zA-Z]{24}"
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            matches=$(git ls-files -z | xargs -0 grep -n -i -E "$pattern" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              # Filter out legitimate uses (e.g. in .gitignore, docs about patterns)
              filtered=$(echo "$matches" | grep -v ".gitignore\|SECURITY_GATES.md\|AGENTS.md\|CLAUDE.md" || true)
              if [ -n "$filtered" ]; then
                echo "WARNING: Potential secret pattern '$pattern' found:"
                echo "$filtered"
                FOUND=1
              fi
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::error::Potential secrets found. Review warnings above."
            exit 1
          fi
          echo "No secrets detected."
          echo "::endgroup::"

      - name: Check .env files
        run: |
          ENV_FILES=$(git ls-files | grep -i "\.env$" || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::.env files found in repository:"
            echo "$ENV_FILES"
            exit 1
          fi
          echo "No .env files found."

      - name: Check DB files
        run: |
          DB_FILES=$(git ls-files | grep -E "\.db(-shm|-wal|-journal)?$" || true)
          if [ -n "$DB_FILES" ]; then
            echo "::error::Database files found in repository:"
            echo "$DB_FILES"
            exit 1
          fi
          echo "No database files found."
